<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cápsula Digital - Citlally</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap');

        :root {
            --neon-green: #39ff14;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --bg: #050505;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--neon-green);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: none;
        }

        /* Grid scanlines background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(57,255,20,0.03) 2px, rgba(57,255,20,0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(57,255,20,0.02) 40px, rgba(57,255,20,0.02) 41px);
            pointer-events: none;
            z-index: 0;
        }

        /* Glitch flicker animation */
        @keyframes flicker {
            0%, 97%, 100% { opacity: 1; }
            98% { opacity: 0.6; }
            99% { opacity: 0.9; }
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            animation: flicker 5s infinite;
            z-index: 0;
        }

        /* Guardian cursor */
        #guardian {
            position: fixed;
            width: 90px;
            pointer-events: none;
            z-index: 999;
            transition: left 0.05s linear, top 0.05s linear;
            filter: drop-shadow(0 0 8px var(--neon-cyan));
        }

        /* Main container */
        #app {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Header */
        .header {
            font-family: 'Orbitron', monospace;
            font-size: 1.1rem;
            letter-spacing: 6px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 30px var(--neon-cyan);
            margin-bottom: 10px;
            animation: flicker 4s infinite;
        }

        /* Chest / cofre */
        #cofre {
            cursor: none;
            width: 180px;
            height: 180px;
            object-fit: contain;
            border-radius: 50%;
            border: 2px solid var(--neon-cyan);
            padding: 10px;
            background: rgba(0, 243, 255, 0.04);
            transition: transform 0.3s, filter 0.3s, box-shadow 0.3s;
            filter: drop-shadow(0 0 12px var(--neon-cyan));
            box-shadow: 0 0 20px rgba(0,243,255,0.3), inset 0 0 20px rgba(0,243,255,0.05);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0,243,255,0.3), inset 0 0 20px rgba(0,243,255,0.05); }
            50% { box-shadow: 0 0 40px rgba(0,243,255,0.6), inset 0 0 30px rgba(0,243,255,0.1); }
        }

        #cofre:hover {
            transform: scale(1.08) rotate(2deg);
            filter: drop-shadow(0 0 25px var(--neon-cyan));
        }

        .cta-text {
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green);
            text-transform: uppercase;
            animation: blink 1.5s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Terminal bar bottom */
        .terminal-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 6px 16px;
            font-size: 0.65rem;
            color: rgba(57,255,20,0.4);
            border-top: 1px solid rgba(57,255,20,0.15);
            z-index: 10;
            display: flex;
            justify-content: space-between;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 500;
            inset: 0;
            background-color: rgba(0,0,0,0.92);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: #0a0a0a;
            padding: 35px 30px;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 40px rgba(57,255,20,0.4), 0 0 80px rgba(57,255,20,0.15);
            text-align: center;
            border-radius: 4px;
            max-width: 380px;
            width: 90%;
            position: relative;
            animation: modalIn 0.4s ease-out;
        }

        @keyframes modalIn {
            from { transform: scale(0.85) translateY(20px); opacity: 0; }
            to   { transform: scale(1) translateY(0); opacity: 1; }
        }

        .modal-content::before {
            content: '> SISTEMA DESBLOQUEADO';
            position: absolute;
            top: -12px;
            left: 20px;
            background: #0a0a0a;
            padding: 0 8px;
            font-size: 0.65rem;
            color: var(--neon-green);
            letter-spacing: 3px;
        }

        .modal-content h2 {
            margin: 0 0 6px 0;
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--neon-green);
            text-shadow: 0 0 15px var(--neon-green);
        }

        .modal-content .username {
            font-size: 0.75rem;
            color: var(--neon-cyan);
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .modal-content img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            border-radius: 50%;
            border: 1px solid rgba(57,255,20,0.4);
            padding: 8px;
        }

        #close-btn {
            margin-top: 22px;
            display: block;
            width: 100%;
            background: transparent;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 10px 20px;
            cursor: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        #close-btn:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--neon-green);
        }
    </style>
</head>

    <script>
        const guardian = document.getElementById('guardian');
        const cofre = document.getElementById('cofre');
        const modal = document.getElementById('miModal');
        const closeBtn = document.getElementById('close-btn');

        document.addEventListener('mousemove', (e) => {
            guardian.style.left = (e.clientX - 45) + 'px';
            guardian.style.top  = (e.clientY - 45) + 'px';
        });

        cofre.addEventListener('click', () => {
            modal.style.display = 'flex';
        });

        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        window.onclick = (e) => {
            if (e.target === modal) modal.style.display = 'none';
        };

        // Live clock
        const clock = document.getElementById('clock');
        setInterval(() => {
            clock.textContent = new Date().toLocaleTimeString('es-MX', {hour12: false});
        }, 1000);
    </script>
